<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板金曲げ 展開寸法・伸び値計算ツール</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #eceff1; color: #333; line-height: 1.5; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); max-width: 550px; margin: auto; }
        h2 { font-size: 1.3em; text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .row > div { flex: 1; }
        label { font-size: 0.85em; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cfd8dc; border-radius: 4px; font-size: 1.1em; box-sizing: border-box; transition: 0.2s; }
        select:focus, input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        
        .mat-selector { display: flex; flex-wrap: wrap; border-radius: 4px; overflow: hidden; border: 1px solid #3498db; margin-bottom: 15px; }
        .mat-selector input { display: none; }
        .mat-selector label { flex: 1 1 30%; text-align: center; padding: 10px 5px; cursor: pointer; background: #fff; margin: 0; font-size: 0.85em; font-weight: bold; transition: 0.3s; border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; box-sizing: border-box; }
        .mat-selector label:last-child { border-right: none; }
        .mat-selector input:checked + label { background: #3498db; color: white; border-color: #3498db; }

        .result-box { margin-top: 20px; padding: 15px; background: #fffde7; border: 2px solid #fbc02d; border-radius: 6px; }
        .highlight { font-family: monospace; font-size: 1.6em; font-weight: bold; color: #e74c3c; display: block; margin-top: 5px; }
        .d-value { font-size: 0.9em; color: #455a64; margin-top: 5px; font-weight: bold; }
        .sensor-status { font-size: 0.85em; padding: 8px; border-radius: 4px; display: block; margin-top: 10px; text-align: center; font-weight: bold; }
        .sensor-ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #81c784; }
        .sensor-ng { background: #ffebee; color: #c62828; border: 1px solid #e57373; }
        
        .btn-mem { width: 100%; padding: 12px; margin-top: 15px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-mem:hover { background: #27ae60; }
        .memory-box { margin-top: 15px; padding: 12px; background: #f1f8e9; border: 1px dashed #2ecc71; border-radius: 5px; font-size: 0.85em; max-height: 150px; overflow-y: auto; }
        .memory-item { border-bottom: 1px solid #dce775; padding: 8px 0; }
        .memory-item:last-child { border-bottom: none; }
        .note { font-size: 0.8em; color: #7f8c8d; margin-top: 15px; text-align: left; line-height: 1.5; background: #f8f9fa; padding: 10px; border-radius: 4px; }
        
        /* プレビュー用キャンバスのスタイル */
        canvas { width: 100%; height: 160px; background: #fff; border: 1px dashed #ccc; border-radius: 4px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>板金曲げ 展開寸法計算ツール</h2>

    <label>材質選択</label>
    <div class="mat-selector">
        <input type="radio" name="mat" id="mat_spcc" value="SPCC_SECC" checked onchange="calc()">
        <label for="mat_spcc">SPCC/SECC</label>
        <input type="radio" name="mat" id="mat_ss" value="SS400" onchange="calc()">
        <label for="mat_ss">SS400</label>
        <input type="radio" name="mat" id="mat_sus" value="SUS304" onchange="calc()">
        <label for="mat_sus">SUS304</label>
        <input type="radio" name="mat" id="mat_al" value="A5052" onchange="calc()">
        <label for="mat_al">A5052 (AL)</label>
    </div>
    
    <div class="row">
        <div>
            <label>板厚 (t)</label>
            <select id="t" onchange="autoV()">
                <option value="0.8">0.8</option>
                <option value="1.0">1.0</option>
                <option value="1.2">1.2</option>
                <option value="1.5">1.5</option>
                <option value="1.6" selected>1.6</option>
                <option value="2.0">2.0</option>
                <option value="2.3">2.3</option>
                <option value="3.0">3.0</option>
                <option value="3.2">3.2</option>
                <option value="4.0">4.0</option>
                <option value="4.5">4.5</option>
                <option value="5.0">5.0</option>
                <option value="6.0">6.0</option>
            </select>
        </div>
        <div>
            <label>使用ダイ (V幅)</label>
            <select id="v" onchange="calc()">
                <option value="6">V6</option>
                <option value="8">V8</option>
                <option value="10">V10</option>
                <option value="12" selected>V12</option>
                <option value="14">V14</option>
                <option value="16">V16</option>
                <option value="18">V18</option>
                <option value="20">V20</option>
                <option value="25">V25</option>
                <option value="32">V32</option>
                <option value="40">V40</option>
                <option value="50">V50</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div>
            <label>パンチR</label>
            <select id="pr" onchange="calc()">
                <option value="0.2">R0.2 (鋭角)</option>
                <option value="0.6" selected>R0.6 (標準)</option>
                <option value="1.0">R1.0 (標準)</option>
                <option value="3.0">R3.0 (大R)</option>
            </select>
        </div>
    </div>

    <hr style="border:0; border-top:1px solid #ddd; margin: 15px 0;">

    <div class="row">
        <div><label>外寸1 (L1)</label><input type="number" id="l1" oninput="calc()" placeholder="0.0"></div>
        <div><label>角度1</label><input type="number" id="a1" value="90" oninput="calc()"></div>
    </div>
    <div class="row">
        <div><label>外寸2 (L2)</label><input type="number" id="l2" oninput="calc()" placeholder="0.0"></div>
        <div><label>角度2</label><input type="number" id="a2" value="90" oninput="calc()"></div>
    </div>
    <div class="row">
        <div><label>外寸3 (L3)</label><input type="number" id="l3" oninput="calc()" placeholder="0.0"></div>
        <div><label>角度3</label><input type="number" id="a3" value="90" oninput="calc()"></div>
    </div>
    <div class="row">
        <div><label>外寸4 (L4)</label><input type="number" id="l4" oninput="calc()" placeholder="0.0"></div>
    </div>

    <div class="result-box">
        <label>曲げ形状プレビュー</label>
        <canvas id="previewCanvas" width="500" height="200"></canvas>
        
        <label>展開寸法 (全長)</label>
        <span id="res_total" class="highlight">-</span>
        <div id="d_val_display" class="d-value"></div>
        <div id="sensor_msg"></div>
        <hr style="border:0; border-top:1px dashed #ccc; margin: 10px 0;">
        <label>ケガキ位置 (端面からの距離)</label>
        <div id="res_kegaki" style="line-height: 1.6; font-size: 1.0em; color:#1565c0; font-family: monospace; font-weight: bold;">-</div>
    </div>

    <button class="btn-mem" onclick="saveMemory()">結果を一時記憶する</button>
    <div id="memory_area" class="memory-box" style="display:none;">
        <strong>【記憶リスト】</strong>
        <div id="memory_list"></div>
    </div>
    
    <div class="note">
        ※ 算出される伸び値・展開寸法は一般的な理論値および経験則に基づく目安です。正確な寸法出しには必ず端材等での試し曲げを行ってください。
    </div>
</div>

<script>
    const deductionTable = {
        "SPCC_SECC": { "0.8":1.4, "1.0":1.7, "1.2":2.0, "1.5":2.5, "1.6":2.6, "2.0":3.3, "2.3":3.9, "3.0":5.2, "3.2":5.6, "4.0":7.0, "4.5":8.0, "5.0":9.0, "6.0":10.5 },
        "SS400":     { "0.8":1.5, "1.0":1.8, "1.2":2.1, "1.5":2.6, "1.6":2.8, "2.0":3.5, "2.3":4.2, "3.0":5.5, "3.2":6.0, "4.0":7.5, "4.5":8.5, "5.0":9.5, "6.0":11.0 },
        "SUS304":    { "0.8":1.5, "1.0":1.8, "1.2":2.1, "1.5":2.7, "1.6":2.9, "2.0":3.6, "2.3":4.2, "3.0":5.6, "3.2":6.0, "4.0":7.6, "4.5":8.5, "5.0":9.6, "6.0":11.2 },
        "A5052":     { "0.8":1.3, "1.0":1.6, "1.2":1.9, "1.5":2.3, "1.6":2.5, "2.0":3.1, "2.3":3.6, "3.0":4.7, "3.2":5.0, "4.0":6.3, "4.5":7.0, "5.0":8.0, "6.0":9.5 }
    };
    
    const defaultV = { 
        "0.8":"6", "1.0":"8", "1.2":"8", "1.5":"10", "1.6":"12", 
        "2.0":"14", "2.3":"16", "3.0":"20", "3.2":"25", 
        "4.0":"32", "4.5":"32", "5.0":"40", "6.0":"50" 
    };

    function autoV() {
        const t = document.getElementById('t').value;
        const targetV = defaultV[t];
        const vSelect = document.getElementById('v');
        for(let i=0; i<vSelect.options.length; i++){
            if(vSelect.options[i].value === targetV){
                vSelect.selectedIndex = i;
                break;
            }
        }
        calc();
    }

    function drawPreview(ls, angles, t) {
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (ls[0] <= 0) {
            // 寸法未入力時はガイドテキストを表示
            ctx.fillStyle = '#aaa';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('寸法を入力すると形状がプレビューされます', canvas.width / 2, canvas.height / 2);
            return;
        }

        let pts = [{x: 0, y: 0}];
        let currentX = 0;
        let currentY = 0;
        let currentAngle = 0; // 開始角度（水平）

        // 各セグメントの頂点座標を計算
        for (let i = 0; i < 4; i++) {
            if (ls[i] <= 0) break;
            
            if (i > 0) {
                // (180 - 入力角度)が実際の曲げ角度。上方向に曲げるためマイナスにする
                currentAngle -= (180 - angles[i-1]) * (Math.PI / 180);
            }
            
            currentX += ls[i] * Math.cos(currentAngle);
            currentY += ls[i] * Math.sin(currentAngle);
            pts.push({x: currentX, y: currentY});
        }

        // 描画がキャンバスに収まるように自動スケール調整
        let minX = 0, maxX = 0, minY = 0, maxY = 0;
        pts.forEach(p => {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.y > maxY) maxY = p.y;
        });

        const padding = 30;
        const width = maxX - minX;
        const height = maxY - minY;

        let scale = 1;
        if (width > 0 || height > 0) {
            const scaleX = (canvas.width - padding * 2) / (width || 1);
            const scaleY = (canvas.height - padding * 2) / (height || 1);
            scale = Math.min(scaleX, scaleY);
        }
        
        // センタリング用のオフセット
        const offsetX = (canvas.width - width * scale) / 2 - minX * scale;
        const offsetY = (canvas.height - height * scale) / 2 - minY * scale;

        // 線の描画設定
        ctx.beginPath();
        ctx.moveTo(pts[0].x * scale + offsetX, pts[0].y * scale + offsetY);
        for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x * scale + offsetX, pts[i].y * scale + offsetY);
        }

        ctx.strokeStyle = '#3498db';
        // 板厚に応じて線の太さを変える（視覚的なわかりやすさ重視）
        ctx.lineWidth = Math.max(3, t * scale * 0.4); 
        ctx.lineJoin = 'round'; // 曲げ部分を丸く表現
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    function calc() {
        const tStr = document.getElementById('t').value;
        const t = parseFloat(tStr);
        const v = parseFloat(document.getElementById('v').value);
        const pr = parseFloat(document.getElementById('pr').value);
        const mat = document.querySelector('input[name="mat"]:checked').value;
        
        const ls = [
            parseFloat(document.getElementById('l1').value) || 0,
            parseFloat(document.getElementById('l2').value) || 0,
            parseFloat(document.getElementById('l3').value) || 0,
            parseFloat(document.getElementById('l4').value) || 0
        ];
        const angles = [
            parseFloat(document.getElementById('a1').value) || 90,
            parseFloat(document.getElementById('a2').value) || 90,
            parseFloat(document.getElementById('a3').value) || 90
        ];

        // プレビュー描画の実行
        drawPreview(ls, angles, t);

        let l90 = deductionTable[mat][tStr];
        let defV = parseFloat(defaultV[tStr]);
        if (v !== defV) l90 = l90 * (v / defV);
        if (pr >= 3.0) l90 += 0.5;

        let totalL = 0;
        let totalMinus = 0;
        let kegakiPoints = [];
        let sensorStatus = "ok"; 

        for (let i = 0; i < 4; i++) {
            if (ls[i] <= 0) break;
            totalL += ls[i];
            
            if (ls[i] < v * 0.7) sensorStatus = "length_ng";

            if (i < 3 && ls[i+1] > 0) {
                let bendAngle = 180 - angles[i];
                if (angles[i] > 165 || angles[i] < 30) sensorStatus = "angle_ng";
                
                let currentL = l90 * Math.pow(bendAngle / 90, 1.5);
                totalMinus += currentL;
                
                let kegakiPos = totalL - totalMinus + (currentL / 2);
                kegakiPoints.push(`線${i+1}: ${kegakiPos.toFixed(2)}`);
            }
        }

        const finalTotal = totalL - totalMinus;
        
        if (finalTotal > 0 && ls[1] > 0) {
            document.getElementById('res_total').innerText = `${finalTotal.toFixed(2)} mm`;
        } else {
            document.getElementById('res_total').innerText = "-";
        }
        
        document.getElementById('res_kegaki').innerHTML = kegakiPoints.length > 0 ? kegakiPoints.join(" ｜ ") : "-";

        const sensorMsgDiv = document.getElementById('sensor_msg');
        if (ls[1] > 0) {
            if (sensorStatus === "ok") {
                sensorMsgDiv.innerHTML = `<span class="sensor-status sensor-ok">✅ 一般的な曲げ加工・角度測定 範囲内</span>`;
            } else if (sensorStatus === "length_ng") {
                sensorMsgDiv.innerHTML = `<span class="sensor-status sensor-ng">⚠️ 警告：フランジ寸法が短すぎます (ダイへの落ち込み注意)</span>`;
            } else {
                sensorMsgDiv.innerHTML = `<span class="sensor-status sensor-ng">⚠️ 警告：角度制限外 (金型干渉やセンサー測定不可の可能性)</span>`;
            }
        } else {
            sensorMsgDiv.innerHTML = "";
        }

        if (angles[0] > 0 && ls[1] > 0) {
            let dBase = (v / 4) * Math.tan(((180 - angles[0]) / 2) * (Math.PI / 180));
            let dFinal = dBase + t + (pr * 0.2);
            document.getElementById('d_val_display').innerText = `【参考D値】ストローク目安: ${dFinal.toFixed(2)}`;
        } else {
            document.getElementById('d_val_display').innerText = "";
        }
    }

    function saveMemory() {
        const total = document.getElementById('res_total').innerText;
        if (total === "-") return;
        
        document.getElementById('memory_area').style.display = "block";
        const list = document.getElementById('memory_list');
        const matSelect = document.querySelector('input[name="mat"]:checked').nextElementSibling.innerText;
        const t = document.getElementById('t').value;
        const v = document.getElementById('v').value;
        
        const div = document.createElement('div');
        div.className = "memory-item";
        div.innerHTML = `[${matSelect} t${t} / V${v}] 展開: <b style="color:#e74c3c; font-size:1.1em;">${total}</b><br><small style="color:#555;">ケガキ: ${document.getElementById('res_kegaki').innerText}</small>`;
        
        list.prepend(div);
    }

    window.onload = function() {
        autoV();
        // 初期状態（寸法未入力）でもプレビューを描画（ガイドテキスト表示のため）
        calc();
    };
</script>
</body>
</html>
